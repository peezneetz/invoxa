name: CI - Automated Testing

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: cd server && npm ci

      - name: Run backend tests
        run: cd server && npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-do-not-use-in-production
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://mock:mock@localhost:5432/mockdb' }}

  test-api:
    name: API Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: cd server && npm ci

      - name: Start backend server
        run: |
          cd server
          npm start &
          sleep 5
        env:
          NODE_ENV: test
          PORT: 5001
          JWT_SECRET: test-secret

      - name: Run API tests
        run: |
          cd server
          npm run test:api || echo "No API tests configured"
        env:
          API_BASE_URL: http://localhost:5001
        continue-on-error: true

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: cd client && npm ci

      - name: Run frontend tests
        run: cd client && npm test
        env:
          CI: true
          VITE_API_URL: http://localhost:5000
        continue-on-error: true

  build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test backend Docker build
        run: |
          cd server
          docker build -t invoxa-backend-test .

      - name: Test frontend Docker build
        run: |
          cd client
          docker build -t invoxa-frontend-test .

      - name: Verify images were created
        run: |
          docker images | grep invoxa

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=========================================="
          echo "CI - AUTOMATED TESTING COMPLETE"
          echo "=========================================="
          echo ""
          echo "✅ Backend tests: ${{ needs.test-backend.result }}"
          echo "✅ API tests: ${{ needs.test-api.result }}"
          echo "✅ Frontend tests: ${{ needs.test-frontend.result }}"
          echo "✅ Docker build test: ${{ needs.build-test.result }}"
          echo ""
          
          if [[ "${{ needs.test-backend.result }}" == "success" && \
                "${{ needs.build-test.result }}" == "success" ]]; then
            echo "🎉 All critical tests passed!"
          else
            echo "⚠️ Some tests failed. Please check the logs above."
            exit 1
          endif