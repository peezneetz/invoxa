name: CI - Automated Testing

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        run: cd server && npm ci

      - name: Run backend tests
        run: cd server && npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-do-not-use-in-production

      - name: Upload test results (if needed)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: server/junit.xml
          retention-days: 7

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        run: cd server && npm ci

      - name: Run coverage report
        run: cd server && npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-do-not-use-in-production

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 7

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test backend Docker build
        run: |
          cd server
          docker build -t invoxa-backend-test .

      - name: Test frontend Docker build
        run: |
          cd client
          docker build -t invoxa-frontend-test .

      - name: Verify images were created
        run: |
          docker images | grep invoxa